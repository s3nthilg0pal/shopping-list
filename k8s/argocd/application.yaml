apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopping-list
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # UPDATE: Point to your git repository
    repoURL: https://github.com/<YOUR_USERNAME>/shopping-list.git
    targetRevision: main
    path: k8s/base

  destination:
    server: https://kubernetes.default.svc
    namespace: shopping-list

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
