apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-list-backend
  namespace: shopping-list
  labels:
    app: shopping-list-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopping-list-backend
  template:
    metadata:
      labels:
        app: shopping-list-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/s3nthilg0pal/shopping-list/backend:d0d125b
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: shopping-list-backend
  namespace: shopping-list
spec:
  selector:
    app: shopping-list-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
