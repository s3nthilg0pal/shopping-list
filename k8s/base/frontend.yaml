apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-list-frontend
  namespace: shopping-list
  labels:
    app: shopping-list-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopping-list-frontend
  template:
    metadata:
      labels:
        app: shopping-list-frontend
    spec:
      containers:
        - name: frontend
          image: shopping-list-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shopping-list-frontend
  namespace: shopping-list
spec:
  selector:
    app: shopping-list-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
